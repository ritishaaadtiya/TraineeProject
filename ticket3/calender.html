<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #btn{
                position: relative;
                left: 35%;
                padding: 5px;
        }
        input[type=text], input[type=password],input[type = email] {
      width: 100%;
      padding: 12px 20px;
      margin: 8px 0;
      /* display: inline-block; */
      border: 1px solid #CCCCCC;
      box-sizing: border-box;
      background-color: #FFFFFF ;
    }
        .container{
            height: 300px;
            width: 40%;
            background-color: antiquewhite;
            background-color: antiquewhite;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: auto;
            margin-top: 40px;

        }
    
    </style>
    
</head>
<body>
    
    <div>
        <h3 style="text-align: center; margin-top: 20px;">Calendar on text fields</h3>
       <div class="container">
        <div class="insidediv">
        <label for="">Your Name</label>
        <input type="text" class="name"><br>
        <label for="">Your DOB</label>
        <input type="text" id="cal" ><br><br>
        <button id="btn">Your age!</button>
        </div>
    </div>
    </div>
    <script>
      $(document).ready(function(){
        $("#cal").datepicker({
    dateFormat: "dd/mm/yy",
    changeMonth: true,
    changeYear: true, 
    yearRange: "1990:2024" // Change the date format as needed
});
        $("#btn").click(function(){
            let name = $(".name").val();
            let val =  $("#cal").datepicker().val();
         console.log(val);

        //  calculate age of person
        let user = $("#cal").val();

        let parts = user.split("/");
        let formattedDate = `${parts[1]}/${parts[0]}/${parts[2]}`;
        let userobj = new Date(formattedDate);
        

        let today = new Date();
        let age = today.getFullYear() - userobj.getFullYear();
        let month = today.getMonth() - userobj.getMonth();
        if (month < 0 || month === 0 && today.getMonth() < userobj.getMonth()){
            age--;
        }
        alert(`Hello ${name} your age is ${age}`);
        });

        
      });
    </script>
</body>
</html>
