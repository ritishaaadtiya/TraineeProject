<!-- 2) Add Dynamic list inside existing list using javascript. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic List Example</title>
    <link rel="stylesheet" type="text/css" href="/css/ques2.css">
</head>
<body>
    <div class="container">
        <h1>Fruits List</h1>
        <ul id="itemList">
            <li>Mango</li>
            <li>Banana</li>
            <li>Orange</li>
        </ul>
        <input type="text" id="itemInput" placeholder="Enter a new item">
        <button id="addButton" onclick="addItem()">Add Item</button>
    </div>
    <script src="./javascript/ques2.js"></script>
</body>
</html>
