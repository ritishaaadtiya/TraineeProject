<!-- Q3 . Display the sum of entered two numbers dynamically using javascript. -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Two Number</title>
 </head>
 <body>
    <label for="">Enter first Number</label>
    <input type="text" id="num1"><br>
    <label for="">Enter Second Number</label>
    <input type="text" id="num2"><br>
    <button type="submit" onclick="sum()">Sum</button>
    <button type="submit" onclick="swap()">swap</button>
    <div id="message" class="message"></div>
    <div id="swap" class="swap"></div>
    <script>
        function sum() {
            let num1 = document.getElementById('num1').value;
            let num2 = document.getElementById('num2').value;
            let sum = parseInt(num1) + parseInt(num2);
            document.getElementById('message').textContent = "sum of Two number is " + sum;
        }
        function swap() {
            let num1 = document.getElementById('num1').value;
            let num2 = document.getElementById('num2').value;      
            let temp = num1;
            num1 = num2;
            num2 = temp; 
            document.getElementById('num1').value = num1;
            document.getElementById('num2').value = num2;
            document.getElementById('swap').textContent = "Swaped  ";
         }
    </script>
 </body>
 </html>
